apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-python-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/iamraivis/k8s-testing.git'
    targetRevision: HEAD
    path: k8s-app-chart # Make sure this matches the folder name of your Helm chart!
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true